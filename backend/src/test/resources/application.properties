spring.application.name=demo-test

# Use in-memory H2 database for testing context loading
spring.datasource.url=jdbc:h2:mem:gitrecipetest;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
