<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitRecipe - Heirloom & Hearth</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#explore">
                <i class="bi bi-egg-fried me-2 logo-icon"></i>
                <span class="logo-text">Git<span class="logo-accent">Recipe</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="d-flex w-100 justify-content-between align-items-center flex-column flex-lg-row">
                    <!-- Search Bar in Nav -->
                    <form class="nav-search-form my-2 my-lg-0 mx-lg-auto" id="global-search-form">
                        <div class="search-input-group">
                            <i class="bi bi-search search-icon"></i>
                            <input class="form-control" type="search" id="search-input" placeholder="Search title, ingredients, author..." aria-label="Search">
                            <button class="btn btn-search" type="submit">Search</button>
                        </div>
                    </form>
                    
                    <!-- Navigation Links -->
                    <ul class="navbar-nav align-items-center mt-2 mt-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="#explore"><i class="bi bi-compass me-1"></i> Explore</a>
                        </li>
                        
                        <!-- Guest Only -->
                        <li class="nav-item guest-only">
                            <a class="nav-link" href="#login"><i class="bi bi-box-arrow-in-right me-1"></i> Login</a>
                        </li>
                        <li class="nav-item guest-only ms-lg-2">
                            <a class="btn btn-action-gradient px-4" href="#register">Register</a>
                        </li>
                        
                        <!-- Logged In Users -->
                        <li class="nav-item user-only d-none">
                            <a class="nav-link" href="#bookmarks"><i class="bi bi-bookmark-star me-1"></i> Bookmarks</a>
                        </li>
                        <li class="nav-item user-only d-none">
                            <a class="nav-link" href="#create-recipe"><i class="bi bi-plus-circle me-1"></i> Add Recipe</a>
                        </li>
                        <li class="nav-item dropdown user-only d-none ms-lg-3">
                            <a class="nav-link dropdown-toggle d-flex align-items-center profile-dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="" alt="Profile" class="nav-avatar me-2" id="nav-user-avatar">
                                <span id="nav-user-name">User</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end glass-dropdown" aria-labelledby="profileDropdown">
                                <li><a class="dropdown-item" href="#" id="my-profile-link"><i class="bi bi-person me-2"></i> My Profile</a></li>
                                <li><a class="dropdown-item" href="#settings" id="profile-settings-link"><i class="bi bi-gear me-2"></i> Settings</a></li>
                                <li><hr class="dropdown-divider border-secondary-subtle"></li>
                                <li><a class="dropdown-item text-danger" href="#" id="logout-btn"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- App Content Wrapper -->
    <div id="app-container" class="container py-4">
        <!-- Views will be dynamically injected here by app.js -->
        <div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <!-- Floating Global Toast Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="app-toast" class="toast align-items-center text-white bg-dark border-0 glass-card" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">
                    Hello, world! This is a toast message.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
